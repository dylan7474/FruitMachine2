<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Reels - Fruit Machine Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2d55;
            --neon-blue: #007aff;
            --neon-gold: #ffcc00;
            --neon-green: #34c759;
            --neon-amber: #ff9500;
            --neon-cyan: #00f2ff;
            --bg-dark: #0a0a0c;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .bungee { font-family: 'Bungee', cursive; }
        .mono { font-family: 'Share Tech Mono', monospace; }

        .machine-container {
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            border: 4px solid #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(255, 45, 85, 0.2);
            border-radius: 2rem;
            transition: transform 0.1s ease-out;
        }

        /* Party Animations */
        @keyframes button-pulse {
            0%, 100% { filter: brightness(1); transform: scale(1); }
            50% { filter: brightness(1.8); transform: scale(1.02); }
        }

        @keyframes credit-flash-intense {
            0%, 100% { background-color: #000; color: var(--neon-gold); box-shadow: inset 0 0 0px var(--neon-gold); }
            33% { background-color: var(--neon-gold); color: #000; box-shadow: 0 0 30px var(--neon-gold); }
            66% { background-color: #fff; color: #000; box-shadow: 0 0 50px #fff; }
        }

        @keyframes cabinet-shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(2px, -2px) rotate(0.5deg); }
            50% { transform: translate(-2px, 2px) rotate(-0.5deg); }
            75% { transform: translate(2px, 2px) rotate(0.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .flash-nudge { animation: button-pulse 0.4s infinite; }
        .flash-hold { animation: button-pulse 0.3s infinite; }
        .flash-bank { animation: button-pulse 0.6s infinite; }
        .flash-collect { animation: button-pulse 0.4s infinite; }
        .flash-gamble { animation: button-pulse 0.2s infinite; }
        .win-party { animation: credit-flash-intense 0.2s infinite; }
        .shake { animation: cabinet-shake 0.1s infinite; }

        .reel-window {
            height: 240px;
            overflow: hidden;
            background: #000;
            position: relative;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
            border: 2px solid #444;
        }

        .reel-window::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.9) 0%,
                rgba(0,0,0,0) 15%,
                rgba(0,0,0,0) 85%,
                rgba(0,0,0,0.9) 100%
            );
            pointer-events: none;
            z-index: 5;
        }

        .reel {
            display: flex;
            flex-direction: column;
            width: 100%;
            transition: border 0.3s ease;
        }

        .reel.held {
            box-shadow: inset 0 0 30px var(--neon-cyan);
            border-left: 2px solid var(--neon-cyan);
            border-right: 2px solid var(--neon-cyan);
        }

        .symbol {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            flex-shrink: 0;
            user-select: none;
        }

        .win-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--neon-pink);
            transform: translateY(-50%);
            box-shadow: 0 0 15px var(--neon-pink);
            z-index: 10;
            opacity: 0.5;
            pointer-events: none;
        }

        .neon-text-pink { text-shadow: 0 0 10px var(--neon-pink); color: var(--neon-pink); }
        .neon-text-gold { text-shadow: 0 0 10px var(--neon-gold); color: var(--neon-gold); }
        .neon-text-blue { text-shadow: 0 0 10px var(--neon-blue); color: var(--neon-blue); }

        .spin-button {
            background: linear-gradient(135deg, #ff2d55 0%, #ff5e3a 100%);
            box-shadow: 0 6px 0 #991b33, 0 10px 20px rgba(255, 45, 85, 0.4);
        }

        .nudge-btn, .gamble-btn, .bank-btn, .collect-btn {
            background: linear-gradient(135deg, #007aff 0%, #0051a8 100%);
            box-shadow: 0 4px 0 #003a78;
        }

        .nudge-btn.hold-active {
            background: linear-gradient(135deg, #00f2ff 0%, #00a0a8 100%);
            box-shadow: 0 4px 0 #006b70;
            color: #000;
        }
        
        .bank-btn {
            background: linear-gradient(135deg, #ff9500 0%, #cc7a00 100%);
            box-shadow: 0 4px 0 #995c00;
        }

        .gamble-btn {
            background: linear-gradient(135deg, #ffcc00 0%, #cc9900 100%);
            box-shadow: 0 4px 0 #996600;
            color: black;
        }
        .collect-btn {
            background: linear-gradient(135deg, #34c759 0%, #248a3d 100%);
            box-shadow: 0 4px 0 #1a632c;
        }

        .nudge-btn:active:not(:disabled), .gamble-btn:active:not(:disabled), .bank-btn:active:not(:disabled), .collect-btn:active:not(:disabled), .spin-button:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: none;
        }

        .nudge-btn:disabled, .gamble-btn:disabled, .bank-btn:disabled, .collect-btn:disabled {
            filter: grayscale(1);
            opacity: 0.3;
            cursor: not-allowed;
            animation: none !important;
        }

        .spin-button:disabled {
            filter: grayscale(1) opacity(0.5);
            cursor: not-allowed;
            box-shadow: none;
        }

        .gamble-light {
            transition: all 0.05s ease;
            opacity: 0.1;
            font-size: 1.5rem;
            letter-spacing: 0.1rem;
        }
        .gamble-light.on {
            opacity: 1;
            filter: brightness(1.8);
            transform: scale(1.15);
            text-shadow: 0 0 15px currentColor;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-6xl w-full">
        <div class="text-center mb-8">
            <h1 class="bungee text-6xl md:text-8xl neon-text-pink italic tracking-tighter">NEON REELS</h1>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 items-stretch">
            
            <!-- Left Side: Payout Table -->
            <div class="bg-black/40 backdrop-blur-md p-4 rounded-xl border border-gray-800 hidden lg:block">
                <h3 class="bungee text-xl text-center mb-4 text-gray-400">PAYS</h3>
                <div id="payout-list" class="space-y-2 text-gray-300"></div>
                <div class="mt-6 border-t border-gray-800 pt-4 text-center">
                    <div class="text-[10px] uppercase text-gray-500 font-bold mb-1">Fixed Stake</div>
                    <div class="text-2xl bungee neon-text-blue">$10</div>
                </div>
            </div>

            <!-- Center: Machine -->
            <div id="machine" class="machine-container p-6 col-span-1 lg:col-span-3 shadow-2xl flex flex-col justify-between">
                
                <div class="flex justify-between gap-4 mb-6">
                    <!-- Credits Window -->
                    <div class="flex-1 bg-black border-2 border-gray-700 p-3 rounded-lg text-center transition-all duration-300 overflow-hidden" id="credit-window">
                        <div class="text-[10px] text-blue-400 font-bold uppercase mb-1" id="credit-label">Credits</div>
                        <div id="balance-display" class="text-2xl bungee neon-text-gold transition-all duration-200">$100</div>
                    </div>

                    <div id="nudge-count-container" class="nudge-indicator flex-1 bg-black border-2 border-blue-600 p-3 rounded-lg text-center">
                        <div class="text-[10px] text-blue-400 font-bold uppercase mb-1">Nudges</div>
                        <div id="nudge-display" class="text-2xl bungee neon-text-blue">0</div>
                    </div>
                    
                    <!-- Gamble Zone -->
                    <div id="gamble-window" class="flex-1 bg-black border-2 border-gray-700 p-3 rounded-lg text-center relative overflow-hidden min-h-[80px] flex flex-col items-center justify-center">
                        <div class="text-[10px] text-pink-400 font-bold uppercase mb-1">Gamble Zone</div>
                        <div id="light-double" class="gamble-light bungee text-green-400">DOUBLE</div>
                        <div id="light-lose" class="gamble-light bungee text-pink-500">LOOSE</div>
                    </div>
                </div>

                <!-- Reel Area -->
                <div class="reel-window rounded-t-xl flex border-t-4 border-l-4 border-r-4 border-gray-800">
                    <div class="win-line"></div>
                    <div id="reel-0" class="reel border-r border-gray-900"></div>
                    <div id="reel-1" class="reel border-r border-gray-900"></div>
                    <div id="reel-2" class="reel"></div>
                </div>

                <!-- Nudge/Hold Row -->
                <div class="grid grid-cols-3 gap-0 border-b-4 border-l-4 border-r-4 border-gray-800 rounded-b-xl overflow-hidden mb-8">
                    <button id="ctrl-0" onclick="handleControlClick(0)" disabled class="nudge-btn py-5 bungee text-sm text-white border-r border-gray-800 rounded-none">NUDGE</button>
                    <button id="ctrl-1" onclick="handleControlClick(1)" disabled class="nudge-btn py-5 bungee text-sm text-white border-r border-gray-800 rounded-none">NUDGE</button>
                    <button id="ctrl-2" onclick="handleControlClick(2)" disabled class="nudge-btn py-5 bungee text-sm text-white rounded-none">NUDGE</button>
                </div>

                <!-- Action Deck -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button id="bank-btn" onclick="bankAction()" disabled class="bank-btn py-6 rounded-xl text-xl bungee tracking-widest text-white">
                        BANK
                    </button>
                    <button id="spin-btn" onclick="spin()" class="spin-button py-6 rounded-xl text-3xl bungee tracking-widest text-white">
                        SPIN
                    </button>
                    <button id="gamble-action-btn" onclick="stopGamble()" disabled class="gamble-btn py-6 rounded-xl text-xl bungee tracking-widest">
                        GAMBLE
                    </button>
                    <button id="collect-btn" onclick="collectWin()" disabled class="collect-btn py-6 rounded-xl text-xl bungee tracking-widest text-white">
                        COLLECT
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SYMBOLS = [
            { id: 'cherry', char: '🍒', value: 5 },
            { id: 'lemon', char: '🍋', value: 10 },
            { id: 'orange', char: '🍊', value: 15 },
            { id: 'plum', char: '🍇', value: 25 },
            { id: 'bell', char: '🔔', value: 50 },
            { id: 'diamond', char: '💎', value: 100 },
            { id: 'seven', char: '7️⃣', value: 500 }
        ];

        const REEL_COUNT = 3;
        const SYMBOL_HEIGHT = 120;
        const STRIP_SIZE = 100;

        let balance = 100; 
        const currentBet = 10;
        let isSpinning = false;
        let nudgesRemaining = 0;
        let pendingWin = 0;
        let gambleState = 0; 
        let gambleInterval = null;
        let gambleSpeed = 200;
        let nudgesAreActiveForTurn = false; 
        let isFlashingWin = false;
        
        let holdsAwarded = false;
        let heldReels = [false, false, false];
        
        let currentIndices = [0, 0, 0];
        let reelStrips = [[], [], []];

        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(freq, type = 'sine', duration = 0.1, vol = 0.2) {
            try {
                if (!audioCtx) audioCtx = new AudioCtx();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function playWinPartySound(amount) {
            const level = amount < 50 ? 1 : (amount < 200 ? 2 : 3);
            if (level === 1) {
                [523, 659, 783].forEach((f, i) => {
                    setTimeout(() => playSound(f, 'sine', 0.2, 0.2), i * 80);
                });
            } else if (level === 2) {
                const notes = [523, 659, 783, 1046, 783, 1046, 1318];
                notes.forEach((f, i) => {
                    setTimeout(() => playSound(f, 'triangle', 0.15, 0.2), i * 100);
                });
            } else {
                let freq = 400;
                for(let i=0; i<15; i++) {
                    setTimeout(() => {
                        playSound(freq, 'square', 0.1, 0.1);
                        freq *= 1.1;
                    }, i * 120);
                }
                setTimeout(() => {
                    [1046, 1318, 1567, 2093].forEach((f, x) => {
                        setTimeout(() => playSound(f, 'square', 0.4, 0.2), x * 150);
                    });
                }, 1800);
            }
        }

        function init() {
            const list = document.getElementById('payout-list');
            [...SYMBOLS].reverse().forEach(s => {
                const row = document.createElement('div');
                row.className = "flex justify-between items-center text-sm font-bold border-b border-gray-800 pb-1";
                row.innerHTML = `<span>${s.char} x3</span> <span class="text-yellow-400">x${s.value}</span>`;
                list.appendChild(row);
            });

            for (let i = 0; i < REEL_COUNT; i++) {
                setupReel(i);
            }
            updateDisplays();
        }

        function setupReel(reelIdx) {
            const reel = document.getElementById(`reel-${reelIdx}`);
            reel.innerHTML = '';
            reelStrips[reelIdx] = [];
            for (let i = 0; i < STRIP_SIZE; i++) {
                const symbol = SYMBOLS[Math.floor(Math.random() * SYMBOLS.length)];
                reelStrips[reelIdx].push(symbol);
                const div = document.createElement('div');
                div.className = 'symbol';
                div.innerHTML = symbol.char;
                reel.appendChild(div);
            }
            const randomStart = Math.floor(Math.random() * (STRIP_SIZE - 15)) + 5;
            currentIndices[reelIdx] = randomStart;
            reel.style.transition = 'none';
            reel.style.transform = `translateY(-${(randomStart * SYMBOL_HEIGHT) - 60}px)`;
        }

        function updateDisplays() {
            const balanceDisp = document.getElementById('balance-display');
            const creditLabel = document.getElementById('credit-label');
            const creditWindow = document.getElementById('credit-window');

            if (!isFlashingWin) {
                if (gambleInterval) {
                    creditLabel.innerText = "POT VALUE";
                    balanceDisp.innerText = `$${pendingWin.toLocaleString()}`;
                    balanceDisp.classList.add('win-party');
                } else {
                    balanceDisp.innerText = `$${balance.toLocaleString()}`;
                    balanceDisp.classList.remove('win-party');
                    creditLabel.innerText = "Credits";
                    creditWindow.classList.remove('border-neon-gold');
                }
            }

            document.getElementById('nudge-display').innerText = nudgesRemaining;
            
            const spinBtn = document.getElementById('spin-btn');
            const bankBtn = document.getElementById('bank-btn');
            const collectBtn = document.getElementById('collect-btn');
            const gambleActionBtn = document.getElementById('gamble-action-btn');
            const gambleWindow = document.getElementById('gamble-window');

            spinBtn.disabled = balance < currentBet || isSpinning || (gambleInterval !== null);

            const nudgeCont = document.getElementById('nudge-count-container');
            if (nudgesRemaining > 0) nudgeCont.classList.add('active');
            else nudgeCont.classList.remove('active');

            // BANK: Flashes if you have active nudges that can be banked
            bankBtn.disabled = isSpinning || nudgesRemaining <= 0 || !nudgesAreActiveForTurn || (gambleInterval !== null);
            if (!bankBtn.disabled) bankBtn.classList.add('flash-bank');
            else bankBtn.classList.remove('flash-bank');

            // COLLECT: Strictly reserved for active Gamble features
            collectBtn.disabled = gambleInterval === null;
            if (!collectBtn.disabled) collectBtn.classList.add('flash-collect');
            else collectBtn.classList.remove('flash-collect');

            gambleActionBtn.disabled = gambleInterval === null;
            if (!gambleActionBtn.disabled) gambleActionBtn.classList.add('flash-gamble');
            else gambleActionBtn.classList.remove('flash-gamble');

            if (gambleInterval !== null) gambleWindow.classList.add('border-neon-gold');
            else gambleWindow.classList.remove('border-neon-gold');

            for (let i = 0; i < 3; i++) {
                const ctrlBtn = document.getElementById(`ctrl-${i}`);
                const reelEl = document.getElementById(`reel-${i}`);
                if (heldReels[i]) reelEl.classList.add('held');
                else reelEl.classList.remove('held');

                if (holdsAwarded) {
                    ctrlBtn.innerText = heldReels[i] ? "HELD" : "HOLD";
                    ctrlBtn.classList.add('hold-active');
                    ctrlBtn.disabled = isSpinning || (gambleInterval !== null);
                    if (!ctrlBtn.disabled) ctrlBtn.classList.add('flash-hold');
                    else ctrlBtn.classList.remove('flash-hold');
                } else {
                    ctrlBtn.innerText = "NUDGE";
                    ctrlBtn.classList.remove('hold-active');
                    ctrlBtn.disabled = isSpinning || nudgesRemaining <= 0 || currentIndices[i] <= 0 || (gambleInterval !== null) || !nudgesAreActiveForTurn;
                    if (!ctrlBtn.disabled) ctrlBtn.classList.add('flash-nudge');
                    else ctrlBtn.classList.remove('flash-nudge');
                }
            }
        }

        async function partyWin(amount) {
            if (amount <= 0) return;
            isFlashingWin = true;
            const balanceDisp = document.getElementById('balance-display');
            const creditLabel = document.getElementById('credit-label');
            const creditWindow = document.getElementById('credit-window');
            const machine = document.getElementById('machine');

            creditLabel.innerText = "WINNER!";
            balanceDisp.innerText = `+$${amount}`;
            balanceDisp.classList.add('win-party');
            
            if (amount >= 50) machine.classList.add('shake');
            playWinPartySound(amount);

            setTimeout(() => {
                isFlashingWin = false;
                machine.classList.remove('shake');
                updateDisplays();
            }, amount >= 200 ? 5000 : 2500);
        }

        function handleControlClick(idx) {
            if (holdsAwarded) toggleHold(idx);
            else nudge(idx);
        }

        function toggleHold(idx) {
            if (!holdsAwarded || isSpinning || gambleInterval !== null) return;
            heldReels[idx] = !heldReels[idx];
            playSound(heldReels[idx] ? 600 : 400, 'sine', 0.1, 0.1);
            updateDisplays();
        }

        async function spin() {
            if (isSpinning || balance < currentBet || (gambleInterval !== null)) return;
            
            // Auto-finalize any win before spinning
            if (pendingWin > 0) {
                const amount = pendingWin;
                balance += amount;
                pendingWin = 0;
                partyWin(amount);
            }

            isSpinning = true;
            balance -= currentBet;
            nudgesAreActiveForTurn = false;
            updateDisplays();
            playSound(150, 'sawtooth', 0.1, 0.1);

            const reelElements = [0, 1, 2].map(id => document.getElementById(`reel-${id}`));
            reelElements.forEach((reel, i) => {
                if (heldReels[i]) return;
                const newTarget = Math.floor(Math.random() * (STRIP_SIZE - 20)) + 10;
                reel.style.transition = 'none';
                reel.style.transform = `translateY(-${(STRIP_SIZE - 5) * SYMBOL_HEIGHT}px)`;
                reel.offsetHeight; 
                currentIndices[i] = newTarget;

                setTimeout(() => {
                    const duration = 2 + (i * 0.6);
                    reel.style.transition = `transform ${duration}s cubic-bezier(0.15, 0, 0.1, 1)`;
                    reel.style.transform = `translateY(-${(currentIndices[i] * SYMBOL_HEIGHT) - 60}px)`;
                    
                    let ticks = 30, tc = 0;
                    const tint = setInterval(() => {
                        if (tc >= ticks) clearInterval(tint);
                        playSound(100 + (tc * 5), 'sine', 0.015, 0.02);
                        tc++;
                    }, (duration * 1000) / ticks);
                }, 50);
            });

            holdsAwarded = false;
            heldReels = [false, false, false];

            setTimeout(() => {
                isSpinning = false;
                const winMultiplier = checkWin();
                if (winMultiplier > 0) {
                    processWin(currentBet * winMultiplier);
                } else {
                    const rand = Math.random();
                    // Consolidated nudge logic: Whenever it triggers, it ALWAYS adds to your bank
                    if (rand < 0.30) {
                        const awarded = Math.floor(Math.random() * 3) + 1;
                        nudgesRemaining = Math.min(10, nudgesRemaining + awarded);
                        nudgesAreActiveForTurn = true;
                        playSound(600, 'sine', 0.2, 0.1);
                    } 
                    else if (rand < 0.50) {
                        holdsAwarded = true;
                        playSound(800, 'sine', 0.3, 0.1);
                    }
                }
                updateDisplays();
            }, 3500);
        }

        function nudge(reelIdx) {
            if (nudgesRemaining <= 0 || isSpinning || gambleInterval !== null || holdsAwarded || !nudgesAreActiveForTurn) return;
            nudgesRemaining--;
            currentIndices[reelIdx]--;
            const reel = document.getElementById(`reel-${reelIdx}`);
            reel.style.transition = 'transform 0.2s cubic-bezier(0.4, 0, 0.2, 1)';
            reel.style.transform = `translateY(-${(currentIndices[reelIdx] * SYMBOL_HEIGHT) - 60}px)`;
            playSound(200, 'sine', 0.1, 0.1);
            
            setTimeout(() => {
                const mult = checkWin();
                if (mult > 0) {
                    pendingWin = currentBet * mult;
                    // Force the turn to end if out of nudges OR a full 3-of-a-kind is hit (multiplier > 2)
                    if (nudgesRemaining === 0 || mult > 2) {
                        nudgesAreActiveForTurn = false;
                        triggerGambleAwardCheck(pendingWin);
                    }
                } else {
                    pendingWin = 0;
                    if (nudgesRemaining === 0) {
                        nudgesAreActiveForTurn = false;
                    }
                }
                updateDisplays();
            }, 250);
        }

        function bankAction() {
            if (isSpinning || nudgesRemaining <= 0 || !nudgesAreActiveForTurn) return;
            nudgesAreActiveForTurn = false;
            playSound(440, 'sine', 0.2, 0.1);
            if (pendingWin > 0) {
                triggerGambleAwardCheck(pendingWin);
            }
            updateDisplays();
        }

        function processWin(winAmt) {
            pendingWin = winAmt;
            triggerGambleAwardCheck(winAmt);
            updateDisplays();
        }

        function triggerGambleAwardCheck(winAmt) {
            if (winAmt <= 0) return;
            // 30% chance for gamble
            if (Math.random() < 0.3) {
                startGambleSequence(winAmt);
            } else {
                // Finale: Auto-bank win and party immediately
                balance += winAmt;
                pendingWin = 0;
                partyWin(winAmt);
                nudgesAreActiveForTurn = false;
            }
        }

        function checkWin() {
            const r = [ reelStrips[0][currentIndices[0]], reelStrips[1][currentIndices[1]], reelStrips[2][currentIndices[2]] ];
            if (r[0].id === r[1].id && r[1].id === r[2].id) return r[0].value;
            if (r[0].id === r[1].id || r[1].id === r[2].id || r[0].id === r[2].id) return 2;
            return 0;
        }

        function startGambleSequence(amount) {
            pendingWin = amount;
            gambleSpeed = 250;
            startBlinking();
            updateDisplays();
        }

        function startBlinking() {
            if (gambleInterval) clearInterval(gambleInterval);
            gambleInterval = setInterval(() => {
                gambleState = (gambleState === 0) ? 1 : 0;
                const d = document.getElementById('light-double');
                const l = document.getElementById('light-lose');
                if (gambleState === 1) {
                    d.classList.add('on'); l.classList.remove('on');
                    playSound(800, 'sine', 0.05, 0.03);
                } else {
                    l.classList.add('on'); d.classList.remove('on');
                    playSound(400, 'sine', 0.05, 0.03);
                }
            }, gambleSpeed);
        }

        function stopGambleInterval() {
            if (gambleInterval) clearInterval(gambleInterval);
            gambleInterval = null;
            document.getElementById('light-lose').classList.remove('on');
            document.getElementById('light-double').classList.remove('on');
        }

        function stopGamble() {
            if (pendingWin <= 0 || gambleInterval === null) return;
            clearInterval(gambleInterval);
            gambleInterval = null;

            if (gambleState === 1) {
                // Success: Double the prize and keep blinking at higher speed
                pendingWin *= 2;
                playSound(1200, 'square', 0.3, 0.1);
                gambleSpeed = Math.max(80, gambleSpeed - 30);
                startBlinking();
                updateDisplays();
            } else {
                // Failure: Lose it all
                playSound(100, 'sawtooth', 0.5, 0.2);
                pendingWin = 0;
                nudgesAreActiveForTurn = false;
                updateDisplays();
            }
        }

        function collectWin() {
            if (pendingWin <= 0 || gambleInterval === null) return;
            const amount = pendingWin;
            
            // Explicitly taking the pot while ladder is blinking
            stopGambleInterval();
            balance += amount;
            pendingWin = 0;
            nudgesAreActiveForTurn = false;
            partyWin(amount);
            updateDisplays();
        }

        window.onload = init;
    </script>
</body>
</html>
